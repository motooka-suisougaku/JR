<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>305系 車内案内表示器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&family=Noto+Sans+SC:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fff;font-family:"Hiragino Sans","Meiryo",sans-serif;overflow:hidden;width:100vw;height:100vh;}
#lcd{width:100%;height:100%;display:flex;flex-direction:column;}
.top{height:38%;background:linear-gradient(to bottom,#eee 0%,#ccc 100%);padding:0 3%;position:relative;display:flex;flex-direction:column;justify-content:center;}
.lang{transition:opacity 0.5s ease-in-out;width:100%;}
.row1{display:flex;align-items:baseline;gap:2.5vw;margin-bottom:0.5vw;}
.type{font-size:2.6vw;font-weight:bold;color:#333;}
.dest{font-size:3.5vw;font-weight:bold;color:#000;}
.row2{display:flex;align-items:baseline;width:68%;}
.status{font-size:3vw;font-weight:bold;color:#333;margin-right:2vw;white-space:nowrap;}
.station{font-size:6.5vw;font-weight:900;color:#000;letter-spacing:-0.3vw;line-height:1;white-space:nowrap;}
.lang.en .station{font-family:Arial,sans-serif;font-size:5.5vw;}
.lang.ko .station{font-family:'Noto Sans KR',sans-serif;font-size:6vw;}
.lang.zh .station{font-family:'Noto Sans SC',sans-serif;}
.right{position:absolute;right:2.5vw;top:10%;bottom:12%;width:11vw;display:flex;flex-direction:column;justify-content:space-between;align-items:center;}
.carnum{font-size:5vw;font-weight:900;line-height:0.8;color:#333;}
.carunit{font-size:1.2vw;font-weight:bold;color:#333;}
.idbox{border:0.5vw solid #e2007e;border-radius:0.8vw;display:flex;flex-direction:column;width:10vw;overflow:hidden;background:#fff;}
.idline{background:#e2007e;color:white;font-size:2vw;text-align:center;font-weight:900;padding:2px 0;}
.idnum{background:white;font-size:5vw;text-align:center;font-weight:900;line-height:1;color:#000;}
.redbar{height:12px;background:#e2007e;}
.bottom{flex:1;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.exit{background:#ffb800;color:#000;font-size:1.8vw;font-weight:bold;padding:0.1vw 4vw;border:2.2px solid #444;margin-bottom:-1px;transition:opacity 0.5s;}
.platform{width:85%;height:13vw;background:#c0c0c0;clip-path:polygon(8% 0%,92% 0%,100% 100%,0% 100%);border-top:3px solid #888;}
.cars{display:flex;gap:0.3vw;margin-top:-4.5vw;z-index:20;}
.car{width:11vw;height:6vw;background:#fff;border:3px solid #444;display:flex;justify-content:center;align-items:center;font-size:3.5vw;font-weight:900;}
.car.active{background:#eee;border-bottom:1.2vw solid #0072bc;}
</style>
</head>
<body>
<div id="lcd">
  <div class="top">
    <div class="lang" id="lang-group">
      <div class="row1"><div class="type" id="l-type">普通</div><div class="dest" id="l-dest">---</div></div>
      <div class="row2"><div class="status" id="l-status"></div><div class="station" id="l-station">---</div></div>
    </div>
    <div class="right">
      <div><div class="carnum" id="l-carnum">1</div><div class="carunit" id="l-unit">号車</div></div>
      <div class="idbox"><div class="idline" id="l-line">JK</div><div class="idnum" id="l-sid">00</div></div>
    </div>
  </div>
  <div class="redbar"></div>
  <div class="bottom">
    <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
      <div class="exit" id="l-exit">出口</div>
      <div class="platform"></div>
      <div class="cars" id="l-cars"></div>
    </div>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const app=initializeApp({
  apiKey:"AIzaSyCajhxTycqSPp0l0ylcVH9Z6Q6I-SahKxE",
  authDomain:"jrkyushu-4b8b8.firebaseapp.com",
  databaseURL:"https://jrkyushu-4b8b8-default-rtdb.firebaseio.com",
  projectId:"jrkyushu-4b8b8",
  storageBucket:"jrkyushu-4b8b8.firebasestorage.app",
  messagingSenderId:"902073194712",
  appId:"1:902073194732:web:bd94e6e04cf74b6dc85fad"
});
const db=getDatabase(app);
const langs=[
  {key:'ja_h',status:'まもなく',type:'普通',for:'ゆき',car:'号車',exit:'出口',cls:''},
  {key:'ja_k',status:'まもなく',type:'普通',for:'方面',car:'号車',exit:'出口',cls:''},
  {key:'en',  status:'Arriving at',type:'Local',for:'for',car:'Car',exit:'Exit',cls:'en'},
  {key:'ko',  status:'곧',type:'보통',for:'행',car:'호車',exit:'나가는 곳',cls:'ko'},
  {key:'zh',  status:'即将到达',type:'普通',for:'方向',car:'号车',exit:'出口',cls:'zh'}
];
let data=null,langIdx=0;
function render(){
  if(!data)return;
  const lg=langs[langIdx];
  const k=lg.key;
  const isMama=(data.status==='まもなく');
  const grp=document.getElementById('lang-group');
  const ex=document.getElementById('l-exit');
  const ut=document.getElementById('l-unit');
  grp.style.opacity=0;ex.style.opacity=0;ut.style.opacity=0;
  setTimeout(()=>{
    document.getElementById('l-type').innerText=lg.type;
    document.getElementById('l-dest').innerText=(data['d_'+k]||data.d_ja_k)+' '+lg.for;
    document.getElementById('l-status').innerText=isMama?lg.status:'';
    document.getElementById('l-station').innerText=data['s_'+k]||data.s_ja_k||'---';
    document.getElementById('l-line').innerText=data.line||'JK';
    document.getElementById('l-sid').innerText=data.sid||'00';
    document.getElementById('l-carnum').innerText=data.carNow||1;
    ut.innerText=lg.car;
    ex.innerText=lg.exit;
    grp.className='lang '+lg.cls;
    let cars='';
    for(let i=1;i<=6;i++)cars+=`<div class="car ${i==data.carNow?'active':''}">${i}</div>`;
    document.getElementById('l-cars').innerHTML=cars;
    grp.style.opacity=1;ex.style.opacity=1;ut.style.opacity=1;
  },500);
}
onValue(ref(db,'lcd/305'),snap=>{
  data=snap.val();
  render();
});
setInterval(()=>{langIdx=(langIdx+1)%langs.length;render();},5000);
</script>
</body>
</html>
